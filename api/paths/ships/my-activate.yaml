post:
  operationId: changeActiveShip
  tags:
    - Ships
  summary: Change Active Ship
  description: Activate this ship and deactivate current
  parameters:
    - in: path
      name: id
      schema:
        type: string
        format: uuid
      required: true
      description: ID of the ship
  responses:
    '204':
      description: "Successfully changed active ship"
    '401':
      $ref: "../../components/responses/InvalidAgentToken.yaml"
    '403':
      $ref: "../../components/responses/AccessDenied.yaml"
  security:
    - AgentAuth: []