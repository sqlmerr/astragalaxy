post:
  operationId: navigatePlanet
  tags:
    - Navigation
  summary: Navigate Planet
  description: Navigate to planet in system
  requestBody:
    required: true
    content: 
      application/json:
        schema:
          $ref: "../../components/schemas/NavigatePlanetRequest.yaml"
  responses:
    '200':
      description: Successfully navigated
      content: 
        application/json:
          schema:
            $ref: "../../components/schemas/NavigationResponse.yaml"
    '401':
      $ref: "../../components/responses/InvalidAgentToken.yaml"
    '422':
      description: Invalid coordinates
      content: 
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yaml"
  security:
    - AgentAuth: []