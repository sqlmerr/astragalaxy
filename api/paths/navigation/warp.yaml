post:
  operationId: navigateWarp
  tags:
    - Navigation
  summary: Navigate Warp
  description: Warp to another system
  requestBody:
    required: true
    content: 
      application/json:
        schema:
          $ref: "../../components/schemas/NavigateWarpRequest.yaml"
  responses:
    '200':
      description: Successfully navigated
      content: 
        application/json:
          schema:
            $ref: "../../components/schemas/NavigationResponse.yaml"
    '401':
      $ref: "../../components/responses/InvalidAgentToken.yaml"
    '422':
      description: Invalid warp path
      content: 
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yaml"
  security:
    - AgentAuth: []