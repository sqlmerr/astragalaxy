post:
  summary: Register user
  tags:
    - Auth
  operationId: registerUser
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../../components/schemas/RegisterUserRequest.yaml"
  responses:
    '201':
      description: User successfully registered
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/User.yaml"
    '409':
      description: User's username already occupied
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yaml"
    '400':
      $ref: "../../components/responses/DecodeError.yaml"
  security: []
