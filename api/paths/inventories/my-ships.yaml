get:
  operationId: getMyShipInventory
  tags:
    - Inventories
  summary: Get My Ship Inventory
  description: Get current agent's ship full inventory
  parameters:
    - in: path
      schema:
        type: string
        format: uuid
      name: id
      description: ID of the ship
  responses:
    '200':
      description: Successfully got ship's inventory
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/FullInventory.yaml"
    '401':
      $ref: "../../components/responses/InvalidAgentToken.yaml"
    '403':
      $ref: "../../components/responses/AccessDenied.yaml"
  security:
    - AgentAuth: []