type: object
required:
  - set_at
  - duration
  - duration_seconds
  - action
properties: 
  set_at:
    type: string
    format: date-time
  duration:
    type: integer
    format: duration
  duration_seconds:
    type: integer
    description: Duration in seconds
  action:
    type: string
    description: The action for which the cooldown was issued