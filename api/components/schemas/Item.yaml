type: object
required:
  - id
  - inventory_id
  - item_type
  - metadata
  - created_at
properties:
  id:
    type: string
    format: uuid
  inventory_id:
    type: string
    format: uuid
  item_type:
    type: string
    description: Item type # TODO: link to documentation with item types
  metadata:
    type: string
    format: json
    example: '{"durability": 42, "name": "Hello World"}'
  created_at:
    type: string
    format: date-time